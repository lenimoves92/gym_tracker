<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gym Tracker</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand fw-bold">Gym Tracker</span>
        <div>
            <a href="{{ url_for('overview') }}" class="btn btn-sm btn-outline-light me-1">Overview</a>
            <a href="{{ url_for('index') }}" class="btn btn-sm btn-outline-light me-1">Log Set</a>
            <a href="{{ url_for('history') }}" class="btn btn-sm btn-outline-light me-1">History</a>
            <a href="{{ url_for('equipment') }}" class="btn btn-sm btn-outline-light">Equipment</a>
        </div>
    </nav>

    <div class="container mt-4 pb-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
