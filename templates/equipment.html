{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Equipment & Exercises</h2>

<div class="card mb-4">
  <div class="card-body">
    <h5 class="card-title">Add Custom Exercise</h5>
    <form action="{{ url_for('add_equipment') }}" method="POST" class="d-flex gap-2">
      <input type="text" name="name" class="form-control"
             placeholder="e.g. Dumbbell Shrug" required>
      <button type="submit" class="btn btn-success">Add</button>
    </form>
  </div>
</div>

<h5>All Exercises</h5>
<ul class="list-group">
  {% for item in equipment_list %}
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <span>{{ item['name'] }}</span>
    <span>
      {% if item['is_custom'] %}
        <span class="badge bg-secondary me-2">Custom</span>
        <form action="{{ url_for('delete_equipment', equipment_id=item['id']) }}"
              method="POST" style="display:inline"
              onsubmit="return confirm('Remove this exercise?')">
          <button class="btn btn-sm btn-outline-danger">Remove</button>
        </form>
      {% else %}
        <span class="badge bg-light text-dark border">Built-in</span>
      {% endif %}
    </span>
  </li>
  {% endfor %}
</ul>

{% endblock %}
